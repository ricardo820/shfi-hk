<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0D0D0E;
            color: #e5e2e3;
            font-family: 'Inter', sans-serif;
        }
        .electric-glow {
            box-shadow: 0 0 40px -10px rgba(46, 91, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="antialiased overflow-hidden">
<!-- Main Content Canvas -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Subtle Architectural Background Element -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[100px]"></div>
</div>
<!-- Entry Gate Container -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-16 flex flex-col items-center space-y-6">
<div class="w-24 h-24 flex items-center justify-center">
<img alt="SHFI Two-Stripe Logo" class="w-full h-full object-contain" data-alt="Minimalist abstract logo with two parallel diagonal stripes in electric blue on a dark black circular field, tech aesthetic" src="assets/icom.png"/>
</div>
<div class="text-center">
<h1 class="text-4xl font-black tracking-tighter text-on-surface uppercase mb-2">SHFI</h1>
</div>
</div>
<!-- Action Section -->
<div class="w-full space-y-4">
<!-- Primary Action -->
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-lg font-bold text-sm tracking-wide transition-all active:scale-95 electric-glow">
                    Sign In
                </button>
<!-- Secondary Action -->
<button class="w-full h-14 bg-surface-container-highest text-on-surface rounded-lg font-bold text-sm tracking-wide transition-all hover:bg-surface-bright active:scale-95">
                    Register
                </button>
</div>
</div>
</div>
</div>
</main>
