<body class="text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->

<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">

<p class="text-[10px] font-bold tracking-[0.2em] text-[#2E5BFF] uppercase mb-2">Management</p>
<h1 class="text-4xl font-extrabold tracking-tighter text-white">Rooms</h1>

<section class="space-y-4">
<!-- Room Item: Apartment 4B -->
<button class="w-full group relative overflow-hidden rounded-xl bg-surface-container-low p-1 transition-all duration-300 hover:scale-[1.02] active:scale-95">
<div class="relative z-10 flex items-center justify-between px-6 py-8 rounded-lg bg-[#131314] glass-card">
<div class="flex items-center gap-6">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-[#2E5BFF]">
<span class="material-symbols-outlined text-3xl" data-icon="apartment">apartment</span>
</div>
<div class="text-left">
<h3 class="text-xl font-bold text-white tracking-tight">Apartment 4B</h3>
<p class="text-xs text-slate-500 uppercase tracking-widest font-medium mt-1">Primary Residence</p>
</div>
</div>
<span class="material-symbols-outlined text-slate-600 group-hover:text-[#2E5BFF] transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<div class="absolute inset-0 bg-gradient-to-br from-[#2E5BFF]/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Room Item: Summer Trip 2024 -->
<button class="w-full group relative overflow-hidden rounded-xl bg-surface-container-low p-1 transition-all duration-300 hover:scale-[1.02] active:scale-95">

<div class="flex items-center gap-6">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-[#2E5BFF]">
<span class="material-symbols-outlined text-3xl" data-icon="travel_explore">travel_explore</span>
</div>
<div class="text-left">
<h3 class="text-xl font-bold text-white tracking-tight">Summer Trip 2024</h3>
<p class="text-xs text-slate-500 uppercase tracking-widest font-medium mt-1">Shared Space</p>
</div>
</div>
<span class="material-symbols-outlined text-slate-600 group-hover:text-[#2E5BFF] transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<div class="absolute inset-0 bg-gradient-to-br from-[#2E5BFF]/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>

<button class="w-full group relative overflow-hidden rounded-xl bg-surface-container-low p-1 transition-all duration-300 hover:scale-[1.02] active:scale-95">

</div>
